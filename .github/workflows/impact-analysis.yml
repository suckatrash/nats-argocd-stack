name: Impact Analysis

on:
  pull_request:
    paths:
      - 'base/**'
      - 'clusters/**'
      - 'argocd/**'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      # Full history: the checkout doubles as the agent's --repo clone, and
      # fetch-depth: 0 guarantees the diff base is present.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract diff
        run: git diff ${{ github.event.pull_request.base.sha }}..${{ github.sha }} > /tmp/change.diff

      - name: Write NATS credentials
        run: |
          echo "${{ secrets.INSIGHTS_NATS_CREDS }}" > /tmp/insights.creds
          chmod 600 /tmp/insights.creds

      # The composite action builds the impact CLI from source vendored in the
      # nats-order-pipeline repo and runs it against impact.yaml at this repo's
      # root; ${VAR} references in the config expand from the env it sets.
      - name: Run impact analysis
        uses: suckatrash/nats-order-pipeline/action@main
        with:
          diff_file: /tmp/change.diff
          nats_server: ${{ secrets.INSIGHTS_NATS_SERVER }}
          nats_creds: /tmp/insights.creds
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD }}
          output_file: /tmp/report.md

      # Publishing the report is the caller's job — the tool itself never
      # talks to GitHub.
      - name: Post PR comment
        if: success()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/report.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
