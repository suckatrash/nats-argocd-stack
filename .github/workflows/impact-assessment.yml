name: Impact Assessment

on:
  pull_request:
    paths:
      - 'base/**'
      - 'clusters/**'
      - 'argocd/**'

jobs:
  assess:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      # Full history: the checkout doubles as the agent's --repo clone, and
      # fetch-depth: 0 guarantees the diff base is present.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract diff
        run: git diff ${{ github.event.pull_request.base.sha }}..${{ github.sha }} > /tmp/change.diff

      - name: Write NATS credentials
        run: |
          echo "${{ secrets.INSIGHTS_NATS_CREDS }}" > /tmp/insights.creds
          chmod 600 /tmp/insights.creds

      # nats-impact is private under another owner, so a direct
      # `uses: synadia-labs/nats-impact@v0.0.1` cannot resolve; check out the
      # release tag with a read token and run the composite action from the
      # local path. NATS_IMPACT_TOKEN is a fine-grained PAT with read-only
      # Contents access to synadia-labs/nats-impact.
      - name: Check out nats-impact
        uses: actions/checkout@v4
        with:
          repository: synadia-labs/nats-impact
          ref: v0.0.1
          token: ${{ secrets.NATS_IMPACT_TOKEN }}
          path: .nats-impact

      # The action builds the CLI from the checked-out release and runs it
      # against impact.yaml at this repo's root; ${VAR} references in the
      # config expand from the env it sets. fail_on gates the merge: the step
      # exits 2 when the derived risk level meets the threshold, so a
      # HIGH/CRITICAL report fails the check.
      - name: Run impact assessment
        uses: ./.nats-impact
        with:
          diff_file: /tmp/change.diff
          nats_server: ${{ secrets.INSIGHTS_NATS_SERVER }}
          nats_creds: /tmp/insights.creds
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prometheus_password: ${{ secrets.PROMETHEUS_PASSWORD }}
          output_file: /tmp/report.md
          fail_on: high

      # Publishing the report is the caller's job — the tool itself never
      # talks to GitHub. always(): the report matters most on the runs the
      # fail_on gate just failed, so post it whenever one was produced.
      - name: Post PR comment
        if: always()
        run: |
          if [ -f /tmp/report.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body-file /tmp/report.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
