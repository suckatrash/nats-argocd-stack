cluster:
  name: minimal
  server: https://kubernetes.default.svc

gcp:
  project: erik-sandbox-408216
  region: us-central1
  network: default

dns:
  baseDomain: gcp.iamusingtheinternet.com
  zoneName: iamusingtheinternet-delegated

apps:
  prometheus:
    enabled: true
  pdcAgent:
    enabled: true
    hostedGrafanaId: "366672"
    cluster: prod-us-central-0
    # Requires 'grafana-pdc-token' secret in GCP Secret Manager

  insights:
    enabled: true
    image: us-central1-docker.pkg.dev/erik-sandbox-408216/insights/insights:latest
    # Requires 'insights-sys-creds' and 'insights-license-jwt' secrets in GCP Secret Manager

  orderPipeline:
    enabled: true
    image: us-central1-docker.pkg.dev/erik-sandbox-408216/insights/order-pipeline:latest
    orderRate: "20"

  nats:
    enabled: true
    host: nats1.gcp.iamusingtheinternet.com
    monitoringHost: nats-mon.gcp.iamusingtheinternet.com

    # Container image
    image:
      repository: nats
      tag: 2.14.3
      pullPolicy: IfNotPresent

    auth:
      operatorJwt: "eyJ0eXAiOiJKV1QiLCJhbGciOiJlZDI1NTE5LW5rZXkifQ..qdqthBn5Ef1OQRV8NsgJsT3274bW_jUBpbv4siavX3eB1KhkZPaTqq2sSbw-H1rgZbX2mxst8woSbMxHIc8ODQ"
      sysAccountJwt: "eyJ0eXAiOiJKV1QiLCJhbGciOiJlZDI1NTE5LW5rZXkifQ..LIAJXeR_mOZKf30KEReLB5Ng7TYRZN7USrqgX2GF5Li4yacmue-LytGrKCmxKwPWywFq2jI2Fl1gRrm2nz40Cg"
      sysAccountId: "ACDSTEJXJ76G7WOWUNWEERWWBJSKGP6BNBH5QDXZDADZUL4YUWRI7MQD"
      resolver:
        type: full                    # full or cache
        interval: 2m
        timeout: 1.9s
        pvc:
          enabled: true
          size: 1Gi
          storageClassName: ""

    # Clustering
    cluster:
      enabled: true
      replicas: 3
      tls:
        enabled: false
        secretName: ""

    # JetStream
    jetstream:
      enabled: true
      domain: "test01"                # e.g., spoke-minimal
      fileStore:
        enabled: true
        dir: /data
        pvc:
          enabled: true
          size: 10Gi
          storageClassName: standard-rwo
        maxSize: ""                   # defaults to PVC size
      memoryStore:
        enabled: true
        maxSize: 1Gi

    # Client TLS
    tls:
      enabled: true
      secretName: nats-tls-cert
      cert: tls.crt
      key: tls.key
      verify: false

    # WebSocket
    websocket:
      enabled: false
      port: 8080
      tls:
        enabled: false
        secretName: ""
      ingress:
        enabled: false
        hosts: []

    # Leaf Nodes
    leafnodes:
      enabled: false
      port: 7422
      tls:
        enabled: false
        secretName: ""
      remotes: []                     # list of {url: "nats-leaf://...", credentials: {...}}

    # Gateway (super-cluster)
    gateway:
      enabled: false
      name: ""
      port: 7222
      tls:
        enabled: false
        secretName: ""
      gateways: []                    # list of {name: "...", urls: [...]}

    # MQTT
    mqtt:
      enabled: false
      port: 1883
      tls:
        enabled: false
        secretName: ""

    # Monitoring
    monitor:
      enabled: true
      port: 8222

    # NATS Box (debug container)
    natsbox:
      enabled: true
      image:
        repository: natsio/nats-box
        tag: 0.14.5
        pullPolicy: IfNotPresent

    # Container resources
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Service configuration
    service:
      type: LoadBalancer
      ports:
        nats:
          enabled: true
        leafnodes:
          enabled: true
        websocket:
          enabled: true
        mqtt:
          enabled: true

certManager:
  email: erik048@gmail.com
  issuer: letsencrypt-prod
