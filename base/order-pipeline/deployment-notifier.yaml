apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: order-pipeline
  labels:
    app: notifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifier
  template:
    metadata:
      labels:
        app: notifier
    spec:
      containers:
        - name: notifier
          image: PLACEHOLDER
          command: ["/app/notifier"]
          envFrom:
            - configMapRef:
                name: order-pipeline-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
