apiVersion: apps/v1
kind: Deployment
metadata:
  name: insights
  namespace: insights
  labels:
    app: insights
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: insights
  template:
    metadata:
      labels:
        app: insights
    spec:
      containers:
        - name: insights
          image: PLACEHOLDER
          imagePullPolicy: Always
          args:
            - "run"
            - "--config"
            - "/etc/insights/config/insights.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              # Zone-us-central1-f node (where the data PVC pins this pod) runs
              # hot on CPU requests; keep this small so the pod fits. The 2-core
              # limit below still lets it burst.
              cpu: 25m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/insights/config
              readOnly: true
            - name: creds
              mountPath: /etc/insights/creds
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: insights-data
        - name: config
          configMap:
            name: insights-config
        - name: creds
          secret:
            secretName: insights-nats-creds
