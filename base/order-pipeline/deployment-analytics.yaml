apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: order-pipeline
  labels:
    app: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: PLACEHOLDER
          command: ["/app/analytics"]
          envFrom:
            - configMapRef:
                name: order-pipeline-config
          volumeMounts:
            - name: nats-creds
              mountPath: /etc/nats/creds
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nats-creds
          secret:
            secretName: orders-nats-creds
