apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: order-pipeline
  labels:
    app: order-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      containers:
        - name: order-api
          image: PLACEHOLDER
          command: ["/app/order-api"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: order-pipeline-config
          volumeMounts:
            - name: nats-creds
              mountPath: /etc/nats/creds
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nats-creds
          secret:
            secretName: orders-nats-creds
